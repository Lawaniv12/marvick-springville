<section id="process" class="process-section">
  <div class="container mx-auto px-6 lg:px-16 py-24 relative z-10">

    <div class="max-w-xl mb-16">
      <p class="section-label">How It Works</p>
      <h2 class="section-title">
        From Zero to Live <span class="text-blue-800">in 7 Days</span>
      </h2>
      <p class="text-muted text-sm leading-relaxed font-light">No technical knowledge needed. We handle everything — you just show up and approve.</p>
    </div>

    <div class="steps-container">
      @for (step of steps; track step.num; let last = $last) {
        <div class="step-row">
          <!-- connector -->
          @if (!last) { <div class="step-connector"></div> }

          <div class="step-number">
            <span class="num-text">{{ step.num }}</span>
          </div>

          <div class="step-content f-card p-8 flex-1">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1">
                <span class="step-tag">{{ step.tag }}</span>
                <h3 class="text-lg font-semibold mt-2 mb-2">{{ step.title }}</h3>
                <p class="text-muted text-sm leading-relaxed font-light">{{ step.desc }}</p>
              </div>
              <!-- <span class="step-icon">{{ step.icon }}</span> -->
            </div>
          </div>
        </div>
      }
    </div>

  </div>
</section>
